version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - armoriq-network

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env.local
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: pnpm dev
    networks:
      - armoriq-network

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: armoriq
      POSTGRES_PASSWORD: armoriq
      POSTGRES_DB: armoriq_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U armoriq -d armoriq_agent"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - armoriq-network

volumes:
  postgres_data:

networks:
  armoriq-network:
    driver: bridge
